apiVersion: apps/v1
kind: Deployment
metadata:
  name: icecream
spec:
  replicas: 2
  selector:
    matchLabels:
      app: icecream
  template:
    metadata:
      labels:
        app: icecream
    spec:
      containers:
      - name: icecream
        image: icecream-app
        imagePullPolicy: Never
        ports:
        - containerPort: 3000
        env:
        - name: MONGO_URL
          value: mongodb://admin:password@mongo:27017
        resources:
          limits:
            cpu: "500m"
            memory: "256Mi"
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: icecream-service
spec:
  type: NodePort
  selector:
    app: icecream
  ports:
  - port: 80
    targetPort: 3000