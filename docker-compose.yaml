version: "3.8"

services:
  mongo:
    image: mongo:6
    container_name: icecream-mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  icecream:
    build: .
    container_name: icecream-app
    ports:
      - "3000:3000"
    depends_on:
      - mongo
    environment:
      MONGO_URL: mongodb://admin:password@mongo:27017
    restart: always

volumes:
  mongo-data:
